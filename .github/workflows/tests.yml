name: Code Quality & Automation
on:
  push:
    branches: [ main, test ]
  pull_request:
    branches: [ main, test ]

jobs:
  verify:
    name: Track Security, Compliance & Bundle Size
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # 1. Exécute les tests unitaires ET la suite de sécurité contre les injections XML/XSS
      - name: Execute strict test suite & generate XML fixtures
        run: npm run test

      # 2. Compile le code avec Tsup pour valider le build de production (.js et .cjs)
      - name: Validate production build
        run: npm run build

      # 🛡️ BARRIÈRE DE SÉCURITÉ 1 : Contrôle du poids limite (Anti-bloatware)
      - name: Verify Bundle Size Limits
        run: npm run size

      # 🛡️ BARRIÈRE DE SÉCURITÉ 2 : Validation de conformité structurale XML de Google
      - name: Install Linux XML Validation Engine
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils

      - name: Verify XML Compliance Against Official W3C/Google Patterns
        run: |
          ls -R tests/
          if [ -f "tests/fixtures/sitemap.xml" ]; then
            echo "🔥 Fixture trouvée ! Analyse syntaxique en cours..."
            xmllint --noout tests/fixtures/sitemap.xml
            echo "✅ Succès : Le flux XML généré respecte à 100% les exigences des serveurs Google !"
          else
            echo "❌ Erreur : La fixture tests/fixtures/sitemap.xml n'a pas été trouvée."
            exit 1
          fi

      # 🛡️ BARRIÈRE DE SÉCURITÉ 3 : Le Gardien de l'API (Conformité de la résolution des types ESM/CJS)
      - name: Run Strict Type Integrity Checks (Are the Types Wrong?)
        run: |
          echo "Analyse des fichiers de déclaration de types générés..."
          npx @arethetypeswrong/cli --pack .
          echo "✅ PARFAIT : La matrice de types exportée est 100% valide et interopérable !"

      # 🛡️ BARRIÈRE DE SÉCURITÉ 3.5 : Validation sémantique croisée négative (Anti-Contradiction de Données v1.1.9 & v1.2.0)
      - name: Verify Cross-Field Semantic Matrix Violations
        run: |
          echo "=== Lancement du test d'intrusion sémantique ==="
          
          cat << 'EOF' > semantic-test.js
          import { getServerSitemapResponse, getServerSitemapIndexResponse } from './dist/index.js';
          
          async function runTests() {
            const invalidLivePayload = [{
              url: 'https://fomadev.com',
              video: {
                title: 'Live Session',
                description: 'DevOps Training',
                thumbnail_loc: 'https://fomadev.com',
                live: 'yes',
                duration: 3600
              }
            }];
            
            const validIndexPayload = [
              { url: 'https://fomadev.com/sitemap-products.xml', lastmod: new Date() },
              { url: 'https://fomadev.com/sitemap-articles.xml', lastmod: new Date() }
            ];

            let errorInterceptionSuccess = false;
            
            try {
              getServerSitemapResponse(invalidLivePayload);
            } catch (error) {
              console.log(`✅ Validation croisée réussie ! Erreur interceptée attendue : ${error.message}`);
              errorInterceptionSuccess = true;
            }

            if (!errorInterceptionSuccess) {
              console.error("❌ FAILLE LOGIQUE : Le package a généré un XML contenant des données contradictoires !");
              process.exit(1);
            }

            try {
              console.log("Validation de l'architecture d'indexation de sitemaps (v1.2.0)...");
              const response = getServerSitemapIndexResponse(validIndexPayload);
              const indexXml = await response.text();
              
              if (!indexXml.includes('<sitemapindex') || !indexXml.includes('<sitemap>')) {
                throw new Error("Structure de sitemapindex malformée.");
              }
              console.log("✅ Architecture d'indexation v1.2.0 validée avec succès !");
            } catch (error) {
              console.error(`❌ ERREUR STRUCTURELLE v1.2.0 : ${error.message}`);
              process.exit(1);
            }

            process.exit(0);
          }

          runTests();
          EOF
          
          node semantic-test.js

      # 🛡️ BARRIÈRE DE SÉCURITÉ 3.8 : Test de pression de la mémoire (GC Allocations & Stream Pressure)
      - name: Profile Garbage Collection & Heap Pressure Under Massive Indexing
        run: |
          echo "=== Lancement du test de stress de rétention mémoire v1.2.0 ==="
          
          cat << 'EOF' > heap-test.js
          import { getServerSitemapIndexResponse } from './dist/index.js';
          
          async function runHeapTest() {
            if (global.gc) { global.gc(); }
            const memInitiale = process.memoryUsage().heapUsed;
            console.log(`Poids initial de la mémoire : ${(memInitiale / 1024 / 1024).toFixed(2)} Mo`);
            
            const liensMassifs = Array.from({ length: 50000 }, (_, i) => ({
              url: `https://fomadev.com/sitemap-${i}.xml`,
              lastmod: new Date()
            }));
            
            console.log("Calcul et consommation du flux XML pour 50 000 sitemaps...");
            
            const response = getServerSitemapIndexResponse(liensMassifs);
            const fluxXml = await response.text();
            
            console.log(`Taille brute du XML généré : ${(fluxXml.length / 1024 / 1024).toFixed(2)} Mo`);

            if (global.gc) { global.gc(); }
            const memFinale = process.memoryUsage().heapUsed;
            console.log(`Poids final de la mémoire après Garbage Collection : ${(memFinale / 1024 / 1024).toFixed(2)} Mo`);
            
            const deltaMemoire = (memFinale - memInitiale) / 1024 / 1024;
            console.log(`Mémoire accumulée et non libérée : ${deltaMemoire.toFixed(2)} Mo`);
            
            if (deltaMemoire > 45) {
              console.error("❌ FAILLE D'INFRASTRUCTURE : Votre logique v1.2.0 retient trop de variables en mémoire !");
              process.exit(1);
            }
            
            console.log("✅ PARFAIT : L'architecture d'indexation v1.2.0 gère la mémoire de manière optimale !");
            process.exit(0);
          }

          runHeapTest();
          EOF
          
          node --expose-gc heap-test.js

      # 🛡️ BARRIÈRE DE SÉCURITÉ 3.9 : Validation d'idempotence absolue et d'immutabilité structurelle
      - name: Verify Strict Idempotency & Structural Immutability
        run: |
          echo "=== Lancement du test de cohérence déterministe v1.2.0 ==="
          
          cat << 'EOF' > idempotency-test.js
          import { getServerSitemapResponse } from './dist/index.js';
          
          async function runIdempotencyTest() {
            const rawEntries = [
              { url: ' https://fomadev.com ', priority: 0.8 },
              { url: 'https://fomadev.com/analytics', priority: 1.0 }
            ];
            
            const resOne = getServerSitemapResponse(rawEntries, { sortByPriority: true });
            const xmlOne = await resOne.text();
            
            const resTwo = getServerSitemapResponse(rawEntries, { sortByPriority: true });
            const xmlTwo = await resTwo.text();
            
            if (xmlOne !== xmlTwo) {
              console.error("❌ FAILLE D'IDEMPOTENCE : Deux exécutions identiques produisent des résultats XML différents !");
              process.exit(1);
            }
            
            if (rawEntries[0].url !== ' https://fomadev.com ') {
              console.error("❌ FAILLE D'IMMUTABILITÉ : Votre package a modifié les données d'entrée de l'utilisateur par référence !");
              process.exit(1);
            }
            
            console.log("✅ PARFAIT : Votre moteur é pur, déterministe et respecte l'immutabilité des références !");
            process.exit(0);
          }

          runIdempotencyTest();
          EOF
          
          node idempotency-test.js

      # 🛡️ BARRIÈRE DE SÉCURITÉ 3.10 : Validation de la conformité internationale et Unicode (Anti-Crash IDN)
      - name: Verify Strict Unicode & Punycode Compliance (International SEO)
        run: |
          echo "=== Lancement du test de conformité internationale v1.2.0 ==="
          
          cat << 'EOF' > international-test.js
          import { getServerSitemapResponse } from './dist/index.js';
          
          async function runInternationalTest() {
            const internationalEntries = [
              { url: 'https://fomadév.com/sécurité', priority: 1.0 },
              { url: 'https://пример.рф/contacts', priority: 0.8 }
            ];
            
            try {
              console.log("Génération du XML avec des données Unicode internationales...");
              const response = getServerSitemapResponse(internationalEntries);
              const xmlOutput = await response.text();
              
              if (!xmlOutput.startsWith('<?xml')) {
                throw new Error("Le flux généré a corrompu l'en-tête XML de base.");
              }
              
              console.log("✅ PARFAIT : Le moteur traite l'internationalisation sans altérer la validité XML !");
              process.exit(0);
            } catch (error) {
              console.error(`❌ FAILLE INTERNATIONALE : Crash du moteur sur caractères complexes : ${error.message}`);
              process.exit(1);
            }
          }

          runInternationalTest();
          EOF
          
          node international-test.js

      # 🛡️ BARRIÈRE DE SÉCURITÉ 3.12 : Test de conformité d'environnement Edge Runtime natif
      - name: Verify Strict Vercel Edge & Cloudflare Workers Compatibility
        run: |
          echo "=== Lancement du test de conformité d'environnement Edge unifié ==="
          
          cat << 'EOF' > edge-runtime-test.js
          import { createRequire } from 'module';
          const require = createRequire(import.meta.url);

          const nativeExit = process.exit;

          const forbiddenModules = ['fs', 'path', 'child_process', 'os', 'crypto', 'http', 'https'];
          forbiddenModules.forEach(mod => {
            require.cache[mod] = { exports: new Proxy({}, {
              get() { throw new Error(`❌ VIOLATION EDGE: Tentative d'accès illégale au module natif Node.js '${mod}'`); }
            })};
          });
          
          const originalEnv = process.env;
          global.process = new Proxy({}, {
            get(_, prop) {
              if (prop === 'env') return originalEnv;
              throw new Error(`❌ VIOLATION EDGE: Utilisation interdite de process.${prop} dans l'Edge Runtime`);
            }
          });

          const { getServerSitemapResponse } = await import('./dist/index.js');
          
          async function testInEdge() {
            try {
              const entries = [{ url: 'https://fomadev.com', priority: 1.0 }];
              const response = getServerSitemapResponse(entries);
              const xml = await response.text();
              
              if (xml.includes('<urlset')) {
                console.log("✅ COMPATIBILITÉ EDGE VALIDÉE : Le code s'exécute parfaitement avec des primitives Web pures !");
              } else {
                throw new Error("Le flux XML généré is invalide.");
              }
            } catch (error) {
              console.error(error.message);
              nativeExit(1);
            }
          }
          
          testInEdge();
          EOF
          
          node edge-runtime-test.js
          echo "✅ EXCELLENT : Votre package est certifié 100% compatible multi-runtime (Edge/Serverless) !"

      # 🛡️ BARRIÈRE DE RÉSILIENCE 14 : Protection contre les dérives d'horloges système (Temporal Robustness)
      - name: Verify Temporal Resilience Against Server Clock Drift
        run: |
          echo "=== Lancement du test de robustesse temporelle ==="
          
          cat << 'EOF' > time-test.js
          import { getServerSitemapResponse } from './dist/index.js';
          
          async function runTemporalTest() {
            try {
              console.log("Simulation d'une dérive temporelle critique (Date lointaine dans le futur)...");
              
              const futureDate = new Date();
              futureDate.setFullYear(futureDate.getFullYear() + 24);
              
              const temporalEntries = [
                {
                  url: 'https://fomadev.com',
                  lastmod: futureDate,
                  priority: 0.5
                }
              ];
              
              const response = getServerSitemapResponse(temporalEntries);
              const xmlOutput = await response.text();
              
              if (!xmlOutput.includes('<lastmod>')) {
                throw new Error("La balise <lastmod> a été omise ou corrompue suite à la dérive temporelle.");
              }
              
              console.log("✅ PARFAIT : Le moteur est temporellement robuste et immunisé contre les dérives d'horloge !");
              process.exit(0);
            } catch (error) {
              console.error(`❌ FAILLE TEMPORELLE : Le moteur a planté face à une anomalie d'horloge : ${error.message}`);
              process.exit(1);
            }
          }

          runTemporalTest();
          EOF
          
          node time-test.js

      # 🛡️ BARRIÈRE DE CONFORMITÉ 16 : Validation croisée par fichiers de schémas officiels XSD (W3C Standard)
      - name: Download and Validate Against Official Sitemaps.org XSD Schemas
        run: |
          echo "=== Téléchargement des schémas officiels de validation ==="
          curl -s -o sitemap.xsd https://www.sitemaps.org/schemas/sitemap/0.9/sitemap.xsd
          curl -s -o siteindex.xsd https://www.sitemaps.org/schemas/sitemap/0.9/siteindex.xsd
          
          echo "=== Lancement de la validation structurelle XSD (v1.2.2) ==="
          cat << 'EOF' > xsd-test.js
          import { getServerSitemapResponse, getServerSitemapIndexResponse } from './dist/index.js';
          import fs from 'fs';

          async function generateFiles() {
            // 1. Génération d'un flux enfant standard et extraction textuelle de la Response
            const childResponse = getServerSitemapResponse([{ url: 'https://fomadev.com', priority: 0.8 }]);
            const childXml = await childResponse.text();
            fs.writeFileSync('generated-child.xml', childXml);

            # 2. Génération d'un flux d'index racine et extraction textuelle
            const indexResponse = getServerSitemapIndexResponse([{ url: 'https://fomadev.com/sitemap-1.xml', lastmod: new Date() }]);
            const indexXml = await indexResponse.text();
            fs.writeFileSync('generated-index.xml', indexXml);

            process.exit(0);
          }
          generateFiles();
          EOF
          
          node xsd-test.js

          echo "Vérification du fichier Enfant par rapport à sitemap.xsd..."
          xmllint --schema sitemap.xsd generated-child.xml --noout
          
          echo "Vérification du fichier Index par rapport à siteindex.xsd..."
          xmllint --schema siteindex.xsd generated-index.xml --noout

          echo "✅ EXCELLENCE : Les flux générés par la v1.2.2 sont 100% alignés avec les règles strictes de Sitemaps.org !"
          rm sitemap.xsd siteindex.xsd generated-child.xml generated-index.xml xsd-test.js

      # 🛡️ BARRIÈRE DE SÉCURITÉ 4 : Test de build SSR réel dans une Sandbox Next.js unifiée
      - name: Setup Sandbox & Validate Next.js Production Build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          CI: "true"
          NODE_ENV: production
          SANDBOX_PACKAGE_JSON: |
            {
              "name": "next-sitemap-sandbox",
              "private": true,
              "version": "1.0.0",
              "type": "module",
              "scripts": {
                "build": "next build"
              }
            }
          SANDBOX_NEXT_CONFIG: |
            /** @type {import('next').NextConfig} */
            const nextConfig = {
              typescript: { ignoreBuildErrors: true }
            };
            export default nextConfig;
          SANDBOX_LAYOUT: |
            export default function RootLayout({ children }: { children: React.ReactNode }) {
              return (
                <html lang="en">
                  <body>{children}</body>
                </html>
              );
            }
          SANDBOX_PAGE: |
            export default function Page() {
              return <h1>FomaDev Sandbox</h1>;
            }
          SANDBOX_ROUTE: |
            import { getServerSitemapResponse } from 'next-advanced-sitemap';
            export const dynamic = 'force-dynamic';
            export async function GET() {
              const entries = [{ url: 'https://fomadev.com', lastmod: new Date(), priority: 1.0 }];
              return getServerSitemapResponse(entries);
            }
        run: |
          set -euxo pipefail                                                  
          
          NPM_TARBALL_JSON=$(npm pack --json)
          NPM_TARBALL=$(node -e "console.log(${NPM_TARBALL_JSON}[0].filename)")
          
          mkdir -p sandbox          
          mv "$NPM_TARBALL" sandbox/package-local.tgz
          cd sandbox                                                             
          
          echo "$SANDBOX_PACKAGE_JSON" > package.json
          echo "$SANDBOX_NEXT_CONFIG" > next.config.mjs
          
          mkdir -p app/sitemap.xml
          echo "$SANDBOX_LAYOUT" > app/layout.tsx
          echo "$SANDBOX_PAGE" > app/page.tsx
          echo "$SANDBOX_ROUTE" > app/sitemap.xml/route.ts

          npm install --no-package-lock --no-workspaces file:./package-local.tgz
          npm install --no-package-lock --no-workspaces next@latest react@latest react-dom@latest @types/react@latest @types/node@latest

          npx next build 2>&1 | tee build.log
          BUILD_EXIT_CODE=${PIPESTATUS[0]}
          
          if [ $BUILD_EXIT_CODE -ne 0 ]; then
            cat build.log
            exit 1
          fi
          echo "✅ SUCCÈS TOTAL : Le package est 100% interopérable !"