name: Code Quality & Automation

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  verify:
    name: Track Security & Core Architecture
    runs-on: ubuntu-latest

    steps:
      # 1. Télécharge le code du dépôt sur le serveur virtuel
      - name: Checkout repository code
        uses: actions/checkout@v4

      # 2. Installe Node.js 22 (LTS) de manière isolée
      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 3. Force l'installation de TOUTES les dépendances (y compris les devDependencies comme vitest)
      - name: Install dependencies (including dev tools)
        run: npm install --include=dev

      # 4. Exécute la matrice stricte de tes tests unitaires (Vitest)
      - name: Execute strict test suite
        run: npm run test

      # 5. Valide que le compilateur (Tsup) génère un build de production valide
      - name: Validate production build
        run: npm run build