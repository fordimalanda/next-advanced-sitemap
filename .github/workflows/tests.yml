name: Code Quality & Automation

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  verify:
    name: Track Security & Core Architecture
    runs-on: ubuntu-latest

    steps:
      # 1. Télécharge le code du dépôt sur le serveur virtuel
      - name: Checkout repository code
        uses: actions/checkout@v4

      # 2. Installe Node.js 22 (LTS) de manière isolée
      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm' # Active le cache pour accélérer les futurs builds

      # 3. Installation stricte et déterministe des dépendances
      - name: Install dependencies
        run: npm ci

      # 4. Exécute la suite complète des 35 tests avec Vitest en mode CI (single run)
      - name: Execute strict test suite
        run: npx vitest run

      # 5. Compile le code avec Tsup pour valider le build de production
      - name: Validate production build
        run: npm run build