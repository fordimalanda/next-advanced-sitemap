name: Automatic Production Release & NPM Publish

on:
  push:
    tags:
      - 'v*' # Se déclenche automatiquement à chaque push de tag commençant par v (ex: v1.2.2)

jobs:
  publish:
    name: Production Release Setup
    runs-on: ubuntu-latest
    
    permissions:
      contents: write # Requis pour créer la release GitHub et y attacher le zip
      id-token: write # Requis pour la publication NPM sécurisée

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Install full workspace dependencies
        run: npm ci

      - name: Strict verification of test suite
        run: npx vitest run

      - name: Build production artifact
        run: npm run build

      # ÉTAPE 1 : Archivage du dossier dist/ au format ZIP avec le bon nommage de version
      - name: Create Production Distribution Artifact (ZIP)
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/}
          echo "Version détectée : $TAG_VERSION"
          zip -r "next-advanced-sitemap-${TAG_VERSION}-dist.zip" dist/
          echo "ZIP_NAME=next-advanced-sitemap-${TAG_VERSION}-dist.zip" >> $GITHUB_ENV

      # ÉTAPE 2 : Création de la Release GitHub automatique et envoi du ZIP
      - name: Create GitHub Release & Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: ${{ env.ZIP_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Jeton natif fourni par GitHub

      # ÉTAPE 3 : Publication finale sur le registre NPM
      - name: Publish package to NPM
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}