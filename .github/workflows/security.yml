name: Advanced Cyber Security & Hardening
on:
  push:
    branches: [ main, security ]
  pull_request:
    branches: [ main, security ]

jobs:
  security-intrusion:
    name: Offensive Security & Algorithmic Hardening
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate production build (Pre-requisite)
        run: npm run build

      # 🛡️ BARRIÈRE DE SÉCURITÉ : Protection contre les attaques ReDoS (Complexité Algorithmique)
      - name: Verify Algorithmic Immunity Against Regular Expression DoS (ReDoS Attack)
        run: |
          echo "=== Lancement du test d'intrusion algorithmique ReDoS ==="
          
          cat << 'EOF' > redos-test.js
          import { getServerSitemapResponse } from './dist/index.js';
          
          async function runReDosTest() {
            const maliciousPayload = "a" + " ".repeat(5000) + "a" + "   " + "❌";
            
            const attackEntries = [{
              url: 'https://fomadev.com',
              images: [{
                loc: 'https://fomadev.com/image.jpg',
                title: maliciousPayload,
                caption: maliciousPayload
              }]
            }];

            const baselineEntries = [{ url: 'https://fomadev.com' }];
            
            const warmupRes = getServerSitemapResponse(baselineEntries);
            await warmupRes.text();
            
            console.log("Calcul du temps de traitement sur charge textuelle critique...");
            const startTime = process.hrtime.bigint();
            
            const response = getServerSitemapResponse(attackEntries);
            await response.text();
            
            const endTime = process.hrtime.bigint();
            const durationMs = Number(endTime - startTime) / 1000000;
            
            console.log(`Temps de réponse du processeur de XML/Regex : ${durationMs.toFixed(4)} ms`);
            
            if (durationMs > 10.0) {
              console.error("❌ ALERTE FAILLE SÉCURITÉ : Votre Regex d'échappement est vulnérable aux attaques ReDoS !");
              process.exit(1);
            }
            
            console.log("✅ PARFAIT : Vos expressions régulières sont immunisées contre le déni de service algorithmique !");
            process.exit(0);
          }

          runReDosTest();
          EOF
          
          node redos-test.js
          rm redos-test.js

      # 🛡️ BARRIÈRE DE SÉCURITÉ : Protection contre la Prototype Pollution (Object Security)
      - name: Verify Architectural Immunity Against JavaScript Prototype Pollution
        run: |
          echo "=== Lancement du test d'intrusion par empoisonnement d'objet ==="
          
          cat << 'EOF' > prototype-pollution-test.js
          import { getServerSitemapResponse } from './dist/index.js';
          
          async function runPrototypePollutionTest() {
            const poisonPayload = JSON.parse('{"__proto__": {"vulnerableProperty": "HACKED"}}');
            
            const attackEntries = [
              {
                url: 'https://fomadev.com',
                priority: 1.0,
                images: [poisonPayload]
              }
            ];
            
            try {
              console.log("Exécution du moteur de sitemap sur une charge empoisonnée...");
              const response = getServerSitemapResponse(attackEntries);
              await response.text();
              
              const testObject = {};
              if (testObject.vulnerableProperty === "HACKED") {
                console.error("❌ CRITIQUE : Faille détectée ! Votre package est vulnérable à la Prototype Pollution.");
                process.exit(1);
              }
              
              console.log("✅ SÉCURITÉ ABSOLUE : Votre package est 100% immunisé contre l'empoisonnement d'objets !");
              process.exit(0);
            } catch (error) {
              console.log(`✅ Attaque bloquée ou ignorée de manière sécurisée par validation : ${error.message}`);
              process.exit(0);
            }
          }

          runPrototypePollutionTest();
          EOF
          
          node prototype-pollution-test.js
          rm prototype-pollution-test.js

      # 🛡️ BARRIÈRE DE CYBERSÉCURITÉ : Protection contre les attaques par expansion XML (Billion Laughs)
      - name: Install Linux XML Engine for Security Tests
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils

      - name: Verify Architectural Immunity Against XML Entity Expansion Attacks
        run: |
          echo "=== Lancement du test d'intrusion par amplification XML ==="
          mkdir -p tests/fixtures
          
          cat << 'EOF' > tests/fixtures/lol-attack.xml
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE lolz [
            <!ENTITY lol "lol">
            <!ENTITY lol1 "&lol;&lol;&lol;&lol;&lol;&lol;&lol;&lol;&lol;&lol;">
            <!ENTITY lol2 "&lol1;&lol1;&lol1;&lol1;&lol1;&lol1;&lol1;&lol1;&lol1;&lol1;">
            <!ENTITY lol3 "&lol2;&lol2;&lol2;&lol2;&lol2;&lol2;&lol2;&lol2;&lol2;&lol2;">
          ]>
          <urlset xmlns="http://sitemaps.org">
            <url>
              <loc>https://fomadev.com</loc>
              <image:caption>&lol3;</image:caption>
            </url>
          </urlset>
          EOF
          
          echo "Test de l'étanchéité du linter face au poison récursif (Billion Laughs)..."
          timeout 2 xmllint --noout --nonet tests/fixtures/lol-attack.xml && echo "✅ Sécurité XML OK : Les entités externes récursives sont bloquées et ignorées !" || { echo "❌ FAILLE : Le parseur a tenté d'étendre les entités récursives !"; exit 1; }
          
          rm tests/fixtures/lol-attack.xml

      # 🛡️ BARRIÈRE D'INFRASTRUCTURE 18 : Validation de sécurité et robustesse du cache HTTP (RFC 7234 Compliance)
      - name: Verify Cache-Control Header Integrity & Edge Network Resilience
        run: |
          echo "=== Lancement du test d'intrusion sur la logique de cache HTTP ==="
          
          cat << 'EOF' > cache-security-test.js
          import { getServerSitemapIndexResponse } from './dist/index.js';
          
          try {
            console.log("Validation de l'immunité de l'option maxAge (v1.0.9 / v1.2.2)...");
            
            const configurationsAttaque = [
              { maxAge: -3600 },
              { maxAge: "10; injection" },
              { maxAge: NaN }
            ];

            configurationsAttaque.forEach((config, index) => {
              try {
                const res = getServerSitemapIndexResponse([], config);
                console.log(`Scénario d'attaque ${index + 1} traité de manière sécurisée.`);
              } catch (e) {
                console.log(`Scénario d'attaque ${index + 1} intercepté proprement par une erreur : ${e.message}`);
              }
            });
            
            console.log("✅ PARFAIT : Votre logique de gestion de cache est étanche et protège les infrastructures Cloud !");
            process.exit(0);
          } catch (error) {
            console.error(`❌ FAILLE DE SÉCURITÉ CACHE : Risque majeur d'empoisonnement ou d'effondrement CDN : ${error.message}`);
            process.exit(1);
          }
          EOF
          
          node cache-security-test.js
          rm cache-security-test.js

      # 🛡️ BARRIÈRE D'INGÉNIERIE 19 : Validation mathématique de l'intégrité du chunking (v1.2.4)
      - name: Verify Chunking Precision & Anti-Data Loss Integrity
        run: |
          echo "=== Lancement du test de découpage de données v1.2.4 ==="
          
          cat << 'EOF' > chunk-test.js
          import { chunkSitemapEntries } from './dist/index.js';
          
          // 1. Configuration d'une taille de tableau impaire pour tester les limites strictes
          const totalEntriesCount = 50003; 
          const chunkSize = 10000;
          
          const mockEntries = Array.from({ length: totalEntriesCount }, (_, i) => ({
            url: `https://fomadev.com/${i}`
          }));
          
          console.log(`Découpage de ${totalEntriesCount} éléments par blocs de ${chunkSize}...`);
          const chunks = chunkSitemapEntries(mockEntries, chunkSize);
          
          // 2. Vérification mathématique du nombre de blocs attendus
          const expectedChunksCount = Math.ceil(totalEntriesCount / chunkSize);
          if (chunks.length !== expectedChunksCount) {
            console.error(`❌ ERREUR DE STRUCTURE : Attendu ${expectedChunksCount} blocs, mais obtenu ${chunks.length}`);
            process.exit(1);
          }
          
          // 3. Vérification de la taille exacte du dernier bloc résiduel
          const lastChunk = chunks[chunks.length - 1];
          if (lastChunk.length !== 3) {
            console.error(`❌ ERREUR DE FRONTIÈRE : Le dernier bloc devrait contenir 3 éléments, obtenu ${lastChunk.length}`);
            process.exit(1);
          }
          
          // 4. Test d'anti-perte : On réassemble tout pour vérifier qu'aucune URL ne manque
          const flattenedEntries = chunks.flat();
          if (flattenedEntries.length !== totalEntriesCount) {
            console.error(`❌ PERTE DE DONNÉES : Le tableau réassemblé contient ${flattenedEntries.length} éléments au lieu de ${totalEntriesCount}`);
            process.exit(1);
          }
          
          // 5. Test de robustesse aux cas extrêmes (Tableau vide)
          const emptyResult = chunkSitemapEntries([], chunkSize);
          if (!Array.isArray(emptyResult) || emptyResult.length !== 0) {
            console.error("❌ ERREUR DE CAS EXTRÊME : Le découpage d'un tableau vide doit retourner un tableau vide.");
            process.exit(1);
          }
          
          console.log("✅ EXCELLENCE : L'algorithme chunkSitemapEntries est mathématiquement parfait et ultra-sûr !");
          process.exit(0);
          EOF
          
          node chunk-test.js
          rm chunk-test.js